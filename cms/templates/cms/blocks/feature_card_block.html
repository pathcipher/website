{% load wagtailimages_tags %}
<div class="group rounded-2xl border border-white/10 bg-surface/60 p-6 transition hover:-translate-y-1 hover:border-brand-500/40">
  {% if value.image %}
    {% image value.image fill-600x360 class="mb-4 w-full rounded-xl" %}
  {% elif value.icon_emoji %}
    <div class="mb-4 inline-flex h-12 w-12 items-center justify-center rounded-xl bg-brand-500/15 text-2xl">{{ value.icon_emoji }}</div>
  {% endif %}
  <h3 class="font-display text-lg font-semibold text-white">{{ value.title }}</h3>
  {% if value.body %}<p class="mt-2 text-sm text-slate-400">{{ value.body }}</p>{% endif %}
</div>
