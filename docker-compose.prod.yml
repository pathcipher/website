# Production stack: Postgres + gunicorn + nginx (TLS) + certbot + Watchtower.
#
# One-time TLS bootstrap (after DNS points at the VPS and .env is filled in):
#   ./init-letsencrypt.sh
# Then day-to-day:
#   docker compose -f docker-compose.prod.yml up -d --build     # build locally, or:
#   docker compose -f docker-compose.prod.yml pull web && \
#   docker compose -f docker-compose.prod.yml up -d             # use the published GHCR image
#
# certbot renews automatically; nginx reloads every 6h to pick up new certs.
# Watchtower polls GHCR for a new `web` image and redeploys it automatically
# (see the "watchtower" service below and the README for registry-auth notes
# if you keep the GHCR package private).

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    # `image:` lets this be pulled pre-built from GHCR (what Watchtower acts
    # on); `build:` keeps `docker compose build`/`up --build` working for
    # local iteration. Override DOCKER_IMAGE in .env to pin a specific tag.
    image: ${DOCKER_IMAGE:-ghcr.io/pathcipher/website:latest}
    build: .
    restart: unless-stopped
    # Default CMD (gunicorn) from the Dockerfile is used.
    labels:
      # Only this service is watched/auto-updated by Watchtower.
      - "com.centurylabs.watchtower.enable=true"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DOMAIN},www.${DOMAIN}
      DJANGO_CSRF_TRUSTED_ORIGINS: https://${DOMAIN},https://www.${DOMAIN}
      WAGTAILADMIN_BASE_URL: https://${DOMAIN}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      # Only substitute ${DOMAIN} in templates; leave nginx's own $vars alone.
      NGINX_ENVSUBST_FILTER: "DOMAIN"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - static:/app/staticfiles:ro
      - media:/app/media:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    # We override the command to add a 6h reload loop (picks up renewed certs
    # without downtime). Because the command no longer starts with "nginx", the
    # image skips its config-templating step, so we run the envsubst script
    # ourselves first — otherwise our default.conf.template is never rendered
    # and nginx serves its stock config (which 404s the ACME challenge).
    command: >
      sh -c "/docker-entrypoint.d/20-envsubst-on-templates.sh;
      while :; do sleep 6h & wait $${!}; nginx -s reload; done &
      exec nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Attempt renewal every 12h; no-op until a cert is near expiry.
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

  # Polls GHCR for a new `web` image (pushed by CI on every merge to main)
  # and redeploys it automatically. Only touches containers carrying the
  # watchtower.enable label above — db/nginx/certbot are left alone.
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
      # Watchtower's bundled Docker client defaults to a very old API version
      # and doesn't negotiate up correctly against newer Docker Engines,
      # which now refuse anything below 1.40 ("client version 1.25 is too
      # old"). Pin a modern version to skip that broken negotiation. Check
      # your host's actual ceiling with `docker version` (Server > API
      # version) if this value is ever rejected as too new.
      DOCKER_API_VERSION: ${WATCHTOWER_DOCKER_API_VERSION:-1.44}

volumes:
  pgdata:
  static:
  media:
  certbot_conf:
  certbot_www:
