{% load navigation_tags wagtailcore_tags %}
<header class="sticky top-0 z-40 border-b border-slate-200 bg-white/85 backdrop-blur">
  <nav class="mx-auto flex max-w-7xl items-center justify-between gap-6 px-6 py-4">
    <a href="/" class="group flex items-center gap-2 font-display text-lg font-bold tracking-tight text-ink">
      <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 text-white">🧩</span>
      <span>{{ SITE_NAME }}</span>
    </a>

    <div class="hidden items-center gap-8 md:flex">
      {% main_menu %}
    </div>

    <a
      href="/contact"
      class="hidden rounded-full bg-brand-500 px-5 py-2 text-sm font-bold text-white shadow-lg shadow-brand-500/25 transition hover:bg-brand-600 md:inline-block"
    >
      Contact us
    </a>

    <button
      class="md:hidden text-ink"
      aria-label="Toggle menu"
      onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
    >
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </nav>

  <div id="mobile-menu" class="hidden border-t border-slate-200 px-6 py-4 md:hidden">
    {% main_menu %}
  </div>
</header>
