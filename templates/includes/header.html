{% load navigation_tags wagtailcore_tags %}
<header class="sticky top-0 z-40 border-b border-white/5 bg-ink/80 backdrop-blur">
  <nav class="mx-auto flex max-w-7xl items-center justify-between gap-6 px-6 py-4">
    <a href="/" class="group flex items-center gap-2 font-display text-lg font-bold tracking-tight">
      <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-brand-500 to-accent text-ink">🧩</span>
      <span class="bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent">
        {{ SITE_NAME }}
      </span>
    </a>

    <div class="hidden items-center gap-8 md:flex">
      {% main_menu %}
    </div>

    <a
      href="#contact"
      class="hidden rounded-full bg-brand-500 px-5 py-2 text-sm font-semibold text-white shadow-lg shadow-brand-500/30 transition hover:bg-brand-400 md:inline-block"
    >
      Book now
    </a>

    <button
      class="md:hidden"
      aria-label="Toggle menu"
      onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
    >
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </nav>

  <div id="mobile-menu" class="hidden border-t border-white/5 px-6 py-4 md:hidden">
    {% main_menu %}
  </div>
</header>
