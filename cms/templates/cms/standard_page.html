{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
  <article class="mx-auto max-w-3xl px-6 py-20">
    <header class="animate-fade-up">
      <h1 class="font-display text-4xl font-bold tracking-tight text-ink md:text-5xl">{{ page.title }}</h1>
      {% if page.intro %}
        <div class="mt-4 text-lg text-slate-600 prose max-w-none">{{ page.intro|richtext }}</div>
      {% endif %}
    </header>

    <div class="mt-12">
      {% include "cms/includes/stream_body.html" with body=page.body %}
    </div>
  </article>
{% endblock %}
