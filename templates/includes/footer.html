{% load navigation_tags %}
<footer id="contact" class="border-t border-white/5 bg-surface/40">
  <div class="mx-auto grid max-w-7xl gap-10 px-6 py-14 md:grid-cols-3">
    <div>
      <div class="flex items-center gap-2 font-display text-lg font-bold">
        <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-brand-500 to-accent text-ink">🧩</span>
        {{ SITE_NAME }}
      </div>
      <p class="mt-4 max-w-xs text-sm text-slate-400">
        Live puzzle experiences and escape rooms for teams, parties and events.
      </p>
    </div>

    <div>
      <h3 class="font-display text-sm font-semibold uppercase tracking-wider text-slate-400">Explore</h3>
      <div class="mt-4 flex flex-col gap-2">
        {% main_menu %}
      </div>
    </div>

    <div>
      <h3 class="font-display text-sm font-semibold uppercase tracking-wider text-slate-400">Get in touch</h3>
      <p class="mt-4 text-sm text-slate-400">
        Ready to book or have a question? We'd love to hear from you.
      </p>
      <a
        href="mailto:hello@example.com"
        class="mt-4 inline-block rounded-full border border-brand-500/40 px-5 py-2 text-sm font-semibold text-brand-100 transition hover:bg-brand-500/10"
      >
        Contact us
      </a>
    </div>
  </div>
  <div class="border-t border-white/5 px-6 py-6 text-center text-xs text-slate-500">
    &copy; {% now "Y" %} {{ SITE_NAME }}. All rights reserved.
  </div>
</footer>
