# Production stack: Postgres + gunicorn + nginx (TLS) + certbot.
#
# One-time TLS bootstrap (after DNS points at the VPS and .env is filled in):
#   ./init-letsencrypt.sh
# Then day-to-day:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# certbot renews automatically; nginx reloads every 6h to pick up new certs.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    # Default CMD (gunicorn) from the Dockerfile is used.
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DOMAIN},www.${DOMAIN}
      DJANGO_CSRF_TRUSTED_ORIGINS: https://${DOMAIN},https://www.${DOMAIN}
      WAGTAILADMIN_BASE_URL: https://${DOMAIN}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.27
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      # Only substitute ${DOMAIN} in templates; leave nginx's own $vars alone.
      NGINX_ENVSUBST_FILTER: "DOMAIN"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - static:/app/staticfiles:ro
      - media:/app/media:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    # Reload every 6h so renewed certs are picked up without downtime.
    command: >
      sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done &
             exec nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Attempt renewal every 12h; no-op until a cert is near expiry.
    entrypoint: >
      sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

volumes:
  pgdata:
  static:
  media:
  certbot_conf:
  certbot_www:
