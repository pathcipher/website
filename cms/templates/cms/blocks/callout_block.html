{% comment %}Rendered inside a ListBlock; see the stat row wrapper below.{% endcomment %}
<div class="rounded-2xl border border-white/10 bg-surface/60 p-6 text-center">
  {% if value.label %}<p class="text-xs font-semibold uppercase tracking-wider text-brand-200">{{ value.label }}</p>{% endif %}
  <p class="mt-1 font-display text-4xl font-bold text-white">{{ value.value }}</p>
  {% if value.caption %}<p class="mt-1 text-sm text-slate-400">{{ value.caption }}</p>{% endif %}
</div>
