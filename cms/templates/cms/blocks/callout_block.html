{% comment %}Rendered inside a ListBlock; see the stat row wrapper.{% endcomment %}
<div class="rounded-2xl border border-slate-200 bg-surface p-6 text-center">
  {% if value.label %}<p class="text-xs font-bold uppercase tracking-wider text-brand-500">{{ value.label }}</p>{% endif %}
  <p class="mt-1 font-display text-4xl font-bold text-brand-700">{{ value.value }}</p>
  {% if value.caption %}<p class="mt-1 text-sm text-slate-500">{{ value.caption }}</p>{% endif %}
</div>
